spring:

  application:
    name: xml-processing-engine

  datasource:
    url: jdbc:mysql://localhost:3306/xml_processing_engine
    username: root
    password: Asdfg!@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
